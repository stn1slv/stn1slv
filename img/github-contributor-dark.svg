<svg width="467" height="100" viewBox="0 0 467 100"
     fill="none" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="titleId descId">
  <title id="titleId">Top Contributions Card</title>
  <desc id="descId">List of top 0 repositories contributed to, sorted by stars.</desc>
  
    <style>
      .header {
        font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
        fill: #41b883;
      }
      .stat {
        font: 600 14px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif;
        fill: #fffefe;
      }
      .stat.bold {
        font-weight: 700;
      }
      .not_bold {
        font-weight: 400;
      }
      .icon {
        fill: #41b883;
        display: block;
      }
      .rank-text {
        font: 800 24px 'Segoe UI', Ubuntu, Sans-Serif;
        fill: #fffefe;
        animation: scaleInAnimation 0.3s ease-in-out forwards;
      }
      .rank-circle-rim {
        stroke: #41b883;
        fill: none;
        stroke-width: 6;
        opacity: 0.2;
      }
      .rank-circle {
        stroke: #41b883;
        stroke-dasharray: 250;
        fill: none;
        stroke-width: 6;
        stroke-linecap: round;
        opacity: 0.8;
        transform-origin: -10px 8px;
        transform: rotate(-90deg);
      }
      @keyframes scaleInAnimation {
        from {
          transform: translate(-5px, 5px) scale(0);
        }
        to {
          transform: translate(-5px, 5px) scale(1);
        }
      }
      
        .stagger {
          opacity: 0;
          animation: fadeInAnimation 0.3s ease-in-out forwards;
        }
        @keyframes fadeInAnimation {
          from {
            opacity: 0;
          }
          to {
            opacity: 1;
          }
        }
        @media (prefers-reduced-motion: reduce) {
          .stagger {
            animation: none;
            opacity: 1;
          }
          .rank-text {
            animation: none;
          }
        }
        
    </style>
    

  <defs>
    
  </defs>

  <rect
    x="0.5"
    y="0.5"
    rx="4.5"
    height="99"
    stroke="#e4e2e2"
    width="466"
    fill="#273849"
    stroke-opacity="0"
  />

  
    <g transform="translate(25, 35)">
      <text class="header">Top Contributions</text>
    </g>
    

  <g transform="translate(0, 55)">
    <text x="25" y="15" class="stat bold" fill="#fffefe">No contributions found</text>
  </g>
</svg>